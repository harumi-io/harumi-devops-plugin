stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA

deploy:
  stage: deploy
  image: google/cloud-sdk:slim
  script:
    - gcloud run deploy myapp
        --image $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
        --platform managed
  only:
    - main
